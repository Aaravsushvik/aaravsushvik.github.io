name: Auto Sitemap (Conflict-Free)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate sitemap.xml
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml

          # Home page
          echo '  <url>' >> sitemap.xml
          echo '    <loc>https://aaravsushvik.github.io/</loc>' >> sitemap.xml
          echo '    <changefreq>daily</changefreq>' >> sitemap.xml
          echo '    <priority>1.0</priority>' >> sitemap.xml
          echo '  </url>' >> sitemap.xml

          # Auto-detect HTML pages
          find . -name "*.html" | while read file; do
            path=${file#./}

            if [ "$path" != "index.html" ]; then
              echo '  <url>' >> sitemap.xml
              echo "    <loc>https://aaravsushvik.github.io/${path}</loc>" >> sitemap.xml
              echo '    <changefreq>monthly</changefreq>' >> sitemap.xml
              echo '    <priority>0.7</priority>' >> sitemap.xml
              echo '  </url>' >> sitemap.xml
            fi
          done

          echo '</urlset>' >> sitemap.xml

      - name: Upload sitemap (NO PUSH, NO GIT CONFLICT)
        uses: actions/upload-artifact@v4
        with:
          name: sitemap
          path: sitemap.xml